<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz Score Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Online Quiz Score Calculator</h1>

    <div class="question">
        <p>1. What is the capital of India?</p>
        <input type="text" id="q1" placeholder="Your Answer">
    </div>

    <div class="question">
        <p>2. Which language is used for web pages?</p>
        <input type="text" id="q2" placeholder="Your Answer">
    </div>

    <div class="question">
        <p>3. What does CSS stand for?</p>
        <input type="text" id="q3" placeholder="Your Answer">
    </div>

    <div class="question">
        <p>4. Which company developed Java?</p>
        <input type="text" id="q4" placeholder="Your Answer">
    </div>

    <div class="question">
        <p>5. Which symbol is used for comments in JavaScript?</p>
        <input type="text" id="q5" placeholder="Your Answer">
    </div>

    <button onclick="calculateScore()">Submit Quiz</button>

    <h2 id="result"></h2>

</div>

<script src="script.js"></script>

</body>
</html>
